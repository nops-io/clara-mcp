name: Release integration packages

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  package:
    name: Package Clara integrations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate package structure
        run: |
          test -f packages/claude/.claude-plugin/plugin.json
          test -f packages/claude/.mcp.json
          test -d packages/claude/skills

          test -f packages/cursor/.cursor-plugin/plugin.json
          test -f packages/cursor/.mcp.json
          test -d packages/cursor/skills
          test -d packages/cursor/rules

      - name: Package integrations
        run: |
          chmod +x scripts/package-all.sh
          chmod +x scripts/package-claude.sh
          chmod +x scripts/package-cursor.sh
          chmod +x scripts/current-version.sh || true

          ./scripts/package-all.sh

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" dist/*.zip --clobber
          else
            gh release create "$TAG" dist/*.zip \
              --title "$TAG" \
              --notes "Clara integration packages for $TAG"
          fi
